name: Build Ozark Static News Pages

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Ozark/CGN Apps Script Web App URL (leave blank to use OZARK_API_URL or CGN_API_URL secret)'
        required: false
        default: ''
      include_archives:
        description: 'Also build static pages from the Archives sheet/action when available'
        required: true
        type: choice
        options: ['true', 'false']
        default: 'true'
      max_articles:
        description: 'Maximum total articles to build'
        required: true
        default: '2000'
  repository_dispatch:
    types: [ozark-publish, cgn-publish]
  schedule:
    # GitHub cron is UTC. 11:00 UTC is 7:00 AM Eastern during daylight time.
    # Manual dispatch and repository_dispatch cover immediate rebuilds after publish.
    - cron: '0 11 * * *'

permissions:
  contents: write

concurrency:
  group: ozark-static-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build and validate static Ozark article pages
        env:
          OZARK_API_URL: ${{ github.event.inputs.api_url || github.event.client_payload.api_url || secrets.OZARK_API_URL || secrets.CGN_API_URL || 'https://script.google.com/macros/s/AKfycbw2U1Qezn44zJNnonZMZG06LpB7lh6n7cgiJY8hY34RnriYd2Eq66swuxQ7S_VyHobb/exec' }}
          OZARK_SITE_URL: https://ozarks.cgnnews.net
          OZARK_PUBLICATION_NAME: The Ozark Gazette
          OZARK_INCLUDE_ARCHIVES: ${{ github.event.inputs.include_archives || github.event.client_payload.include_archives || 'true' }}
          OZARK_MAX_ARTICLES: ${{ github.event.inputs.max_articles || github.event.client_payload.max_articles || '2000' }}
          OZARK_NEWS_SITEMAP_HOURS: 48
        run: node scripts/build-news-pages.mjs

      - name: Show generated output preview
        run: |
          echo "Generated static article pages:"
          find news weather sports traffic obituaries -path '*/index.html' -type f 2>/dev/null | sort | head -120 || true
          echo ""
          echo "News sitemap preview:"
          sed -n '1,120p' news-sitemap.xml || true
          echo ""
          echo "General sitemap preview:"
          sed -n '1,80p' sitemap.xml || true

      - name: Commit generated output only when changed
        run: |
          git config user.name "Ozark Static Builder"
          git config user.email "actions@users.noreply.github.com"
          git add news weather sports traffic obituaries sitemap.xml article-sitemap.xml news-sitemap.xml robots.txt
          git diff --cached --quiet || git commit -m "Build Ozark static article pages"
          git push
